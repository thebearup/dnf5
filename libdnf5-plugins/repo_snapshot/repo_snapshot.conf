[main]
name = repo_snapshot
enabled = 0

# POSIX timestamp for the snapshot cutoff.
# Packages published to repos after this time will be excluded from resolution.
# Can also be set via the DNF5_SNAPSHOT_TIME environment variable.
# snapshot_time =

# Comma-separated list of repo IDs to exclude from snapshot filtering.
# Packages from these repos will not be filtered regardless of publish time.
# Can also be set via the DNF5_SNAPSHOT_EXCLUDE_REPOS environment variable.
# snapshot_exclude_repos =
